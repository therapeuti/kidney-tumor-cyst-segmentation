name: "feature_issues_template"
description: "새로운 기능에 대해 작성하는 이슈 템플릿입니다."
title: "feat: "
labels: []
assignees: []

body:
  - type: textarea
    id: feature_description
    attributes:
      label: "만들고자 하는 기능"
      description: "추가하려는 기능에 대한 설명을 작성해주세요."
      placeholder: "예: 사용자가 후처리 파라미터를 저장하고 다시 불러올 수 있도록 한다."
    validations:
      required: true

  - type: textarea
    id: task_details_text
    attributes:
      label: "작업 상세 내용"
      description: "이 기능을 개발하기 위한 작업 항목을 작성해주세요."
      placeholder: |
        예:
        1. API 스펙 정의
        2. 백엔드 로직 추가
        3. 프론트 UI 연결
        4. 테스트 작성
    validations:
      required: true

  - type: input
    id: estimated_time
    attributes:
      label: "예상 기간"
      description: "이 작업을 완료하는 데 걸리는 예상 기간을 입력해주세요."
      placeholder: "예: 4월 24일 - 4월 30일"

  - type: textarea
    id: additional_info
    attributes:
      label: "기타 사항"
      description: "추가적으로 고려해야 할 사항이 있다면 작성해주세요."
      placeholder: "예: backend API 변경과 frontend 상태 관리 수정이 함께 필요함."
