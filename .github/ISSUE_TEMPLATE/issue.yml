name: General issue
description: Report a problem, request an improvement, or propose follow-up work.
title: "[Issue] "
labels:
  - triage
body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue type
      options:
        - Improvement
        - Refactor follow-up
        - UX issue
        - Performance issue
        - Documentation issue
        - Testing gap
        - Other
    validations:
      required: true

  - type: input
    id: scope
    attributes:
      label: Scope
      description: Which part of the project is involved?
      placeholder: Example: frontend viewer, backend sessions, postprocess pipeline
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or goal
      description: What is happening now, or what should be improved?
      placeholder: Describe the current pain point or proposed improvement.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: If you have an idea for a fix or implementation direction, add it here.
      placeholder: Optional but helpful.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What would count as done?
      placeholder: |
        - [ ] ...
        - [ ] ...

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related PRs, or background information.

