name: Bug report
description: Report a bug or regression in the CLI, backend, frontend, or docs.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please include enough detail for us to reproduce the issue quickly.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where did the issue happen?
      options:
        - CLI (segtools.py)
        - Core processing (segtools_core.py)
        - Backend API
        - Frontend UI
        - Tests
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A short description of the bug.
      placeholder: Example: Saving a session fails after postprocess apply in the web UI.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      placeholder: |
        1. Start backend with `uvicorn backend.app.main:app --reload --port 8000`
        2. Start frontend with `npm run dev`
        3. Open S003 case and select phase A
        4. Apply Remove Isolated with default settings
        5. Click Save
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The session should save successfully and remain editable.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The save request returns 500 and the UI shows an error toast.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error message or logs
      description: Paste stack traces, API responses, console logs, or screenshots if available.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share the environment details relevant to the bug.
      placeholder: |
        - OS:
        - Python version:
        - Node version:
        - Browser:
        - Case data used:
        - Commit / branch:
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else that might help, including whether this is a regression.

